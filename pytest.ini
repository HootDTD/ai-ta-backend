[pytest]
# The top-level suite, the co-located apollo/**/tests/ packages, and the
# campaign/tests/ e2e-harness suite. apollo tests were previously never
# collected by a bare `pytest` (testpaths = tests), so apollo code showed as
# uncovered under coverage's source = . — which silently starved the
# diff-cover patch-coverage gate. campaign/tests hit the same gap: campaign/**
# is new source under the patch-coverage diff, but its tests never ran in CI,
# so coverage.xml showed 0% on all of campaign/** and tripped the gate even
# though `python -m pytest campaign/tests` passes 193/193 locally. Collecting
# both here closes that.
testpaths = tests apollo campaign
# pytest-asyncio: treat every `async def test_*` as a coroutine test without
# requiring an explicit @pytest.mark.asyncio decorator.
asyncio_mode = auto
# --strict-markers turns an unregistered/typo'd marker into an error instead of
# a silent no-op. -ra shows a summary of skips/failures at the end of every run.
addopts = --strict-markers -ra
markers =
    unit: pure logic, no DB or network
    integration: requires a real DB / external-service wiring (LLM mocked); see db_session fixture
    e2e: full critical-path flow
    slow: takes > 1s
    llm: exercises an LLM/embedding path (mocked or replayed)
