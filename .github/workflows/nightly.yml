# Nightly — heavy/unbounded suite OFF the PR path (docs/TESTING-CI-PLAN.md §2.5).
#
# Runs the FULL suite (incl. e2e + slow) on a 3.11/3.12 matrix against real
# Testcontainers, enforces the ratcheted PROJECT-floor coverage (distinct from
# the per-PR PATCH gate in ci.yml), and runs an advisory dependency audit.
#
# RAG eval (DeepEval/RAGAS) is intentionally NOT here yet — it lands in Phase 5
# once a golden Q→A set + eval harness exist. It must never run on the PR path
# (nondeterministic, costs money, hits live models). See plan §4 Phase 5.
name: Nightly

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily
  workflow_dispatch:

permissions: {}

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  full:
    name: full suite + e2e (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python-version }}
      # Everything, including e2e + slow. Single-process: session-scoped
      # Testcontainers would otherwise spin one container set per xdist worker.
      - name: Pytest (full suite incl. e2e/slow)
        env:
          CI: "true" # VCR replay-only; never call live APIs
        run: |
          pytest -q --cov --cov-report=xml --cov-report=term-missing
      # PROJECT floor — ratchet UP over time, never DOWN. Baseline measured ~22%
      # (see handoff §6). Start conservative; raise as coverage organically grows.
      - name: Project coverage floor
        run: |
          coverage report --fail-under=20

  audit:
    name: dependency audit (advisory)
    runs-on: ubuntu-latest
    # Advisory: a freshly-disclosed CVE in a transitive dep should surface, not
    # silently fail the nightly. Triage findings; don't auto-block on them.
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/setup
      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --strict
