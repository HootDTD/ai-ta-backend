# Mypy config — intentionally LENIENT for Phase 2.
#
# The codebase is largely untyped, so mypy runs as an ADVISORY (non-blocking)
# CI job (ci.yml `typecheck`, continue-on-error). The goal now is to surface
# obvious type errors on NEW code without drowning in legacy noise. Phase 3
# tightens this (drop ignore_missing_imports, enable disallow_untyped_defs on
# new modules, then make the job required).

[mypy]
python_version = 3.11
# Let mypy resolve modules when handed an arbitrary list of changed file paths
# (avoids "is not in a package / duplicate module" errors in the changed-files job).
explicit_package_bases = True
namespace_packages = True
# Third-party libs without stubs (supabase, pgvector, neo4j, weasyprint, ...)
# should not produce import errors that bury real findings.
ignore_missing_imports = True
# Keep it gentle: don't demand annotations everywhere yet.
disallow_untyped_defs = False
check_untyped_defs = False
warn_return_any = False
warn_unused_ignores = False
no_implicit_optional = True
show_error_codes = True
pretty = True

# Never type-check generated migrations or the test tree under the advisory gate.
exclude = (?x)(
    ^database/migrations/
    | ^tests/
    | ^\.venv/
  )
