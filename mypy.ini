# Mypy config — LENIENT base, ratcheted in CI.
#
# The codebase is largely untyped (245 errors / 36 files measured 2026-06-12),
# so the CI `typecheck` job mirrors the ruff ratchet: ADDED files must be
# mypy-clean (blocking), MODIFIED files are advisory. Legacy debt is paid down
# over time. Remaining Phase 3 work: drop ignore_missing_imports, enable
# disallow_untyped_defs on new modules, migrate database/models.py to
# Mapped[]/mapped_column so ORM attribute writes type-check without ignores
# (the sqlalchemy.ext.mypy.plugin does not fix this under mypy 2.x).

[mypy]
python_version = 3.11
# Let mypy resolve modules when handed an arbitrary list of changed file paths
# (avoids "is not in a package / duplicate module" errors in the changed-files job).
explicit_package_bases = True
namespace_packages = True
# Report errors ONLY for the files explicitly passed on the command line.
# Without this, checking one changed file also surfaces every error in the
# legacy modules it imports — which made the per-file CI gate impossible to
# pass. Imports are still followed and analyzed for types, just not reported.
follow_imports = silent
# Third-party libs without stubs (supabase, pgvector, neo4j, weasyprint, ...)
# should not produce import errors that bury real findings.
ignore_missing_imports = True
# Keep it gentle: don't demand annotations everywhere yet.
disallow_untyped_defs = False
check_untyped_defs = False
warn_return_any = False
warn_unused_ignores = False
no_implicit_optional = True
show_error_codes = True
pretty = True

# Never type-check generated migrations or the test tree under the advisory gate.
exclude = (?x)(
    ^database/migrations/
    | ^tests/
    | ^\.venv/
  )
